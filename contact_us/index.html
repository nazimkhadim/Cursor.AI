<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Construction Company</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <!-- Banner -->
    <section class="contact-banner">
        <h1>Contact Us</h1>
        <p>We’re ready to build your dream project.</p>
    </section>

    <!-- Contact Section -->
    <section class="contact-container">

        <!-- Contact Info -->
        <div class="contact-info">
            <h2>Get In Touch</h2>
            <p><strong>Phone:</strong> +92 300 1234567</p>
            <p><strong>Email:</strong> info@yourconstruction.com</p>
            <p><strong>Address:</strong> Main Road, Karachi, Pakistan</p>
            <p>Working Hours: Mon - Sat (9:00 AM - 6:00 PM)</p>
        </div>

        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Send Us a Message</h2>

            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <input type="tel" placeholder="Your Phone">
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit">Request a Quote</button>
            </form>
        </div>

    </section>

    <!-- Google Map -->
    <section class="map">
        <h2>Our Location</h2>
        <iframe 
            src="https://www.google.com/maps/embed?pb="
            width="100%" 
            height="300" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </section>

</body>
</html>
